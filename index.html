<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Destiny 2 - Spin the Wheel</title>
<style>
  :root {
    --bg: #3a4d7a;
    --panel: #dbe1f0;
    --border: #111111;
    --text: #111111;
    --button-bg: #1c273f;
  }

  body {
    margin: 0;
    background: var(--bg);
    font-family: "Segoe UI", Tahoma, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 30px 20px;
  }

  #notesPanel {
    position: fixed;
    left: 20px;
    top: 30px;
    width: 260px;
    max-height: 620px;
    background: #c5c9d4;
    border: 2px solid var(--border);
    border-radius: 6px;
    box-sizing: border-box;
    padding: 12px 16px;
    overflow-y: auto;
  }

  #notesPanel .box-label {
    margin-bottom: 8px;
  }

  #notesContent {
    white-space: pre-wrap;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }

  .app {
    width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  #title {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1px;
    text-align: center;
  }

  #title span {
    display: inline-block;
  }

  .box {
    width: 100%;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 6px;
    box-sizing: border-box;
    padding: 12px 16px;
  }

  .box-label {
    font-weight: bold;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .result {
    font-size: 22px;
    font-weight: normal;
    color: var(--text);
    text-align: center;
    min-height: 30px;
  }

  .result.landed {
    font-weight: bold;
  }

  #spinButton {
    background: var(--button-bg);
    color: white;
    border: 2px solid var(--border);
    border-radius: 6px;
    font-weight: bold;
    font-size: 14px;
    padding: 10px 0;
    width: 220px;
    cursor: pointer;
  }

  #spinButton:disabled {
    opacity: 0.6;
    cursor: default;
  }

  #buildBox .result {
    display: flex;
    justify-content: center;
    gap: 8px;
    font-size: 18px;
    font-weight: bold;
  }

  #buildExoticRow {
    font-size: 15px;
    margin-top: 4px;
  }

  #filtersBox {
    padding: 0;
    background: #c5c9d4;
  }

  #filtersBox summary {
    cursor: pointer;
    font-weight: bold;
    font-size: 13px;
    padding: 12px 16px;
    list-style: none;
  }

  #filtersBox summary::-webkit-details-marker {
    display: none;
  }

  #filtersBox summary::before {
    content: "▸ ";
  }

  #filtersBox[open] summary::before {
    content: "▾ ";
  }

  .filters-content {
    padding: 0 16px 14px 16px;
  }

  .filter-group {
    margin-bottom: 12px;
  }

  .filter-group-label {
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #333;
    margin-bottom: 5px;
  }

  .toggle-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .toggle-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
  }
</style>
</head>
<body>

<div id="notesPanel">
  <div class="box-label">Notes</div>
  <div id="notesContent"></div>
</div>

<div class="app">
  <div id="title"></div>

  <div class="box">
    <div class="box-label">Class</div>
    <div class="result" id="classResult">-</div>
  </div>

  <div class="box">
    <div class="box-label">Subclass</div>
    <div class="result" id="subclassResult">-</div>
  </div>

  <div class="box" id="exoticBox">
    <div class="box-label">Exotic Armor</div>
    <div class="result" id="exoticResult">-</div>
  </div>

  <button id="spinButton">Spin</button>

  <div class="box" id="buildBox">
    <div class="box-label">Your Build</div>
    <div class="result" id="buildResultRow">
      <span id="buildClass">-</span>
      <span>-</span>
      <span id="buildSubclass">-</span>
    </div>
    <div class="result" id="buildExoticRow">
      <span id="buildExotic">-</span>
    </div>
  </div>

  <details class="box" id="filtersBox">
    <summary>Filters</summary>
    <div class="filters-content">

      <div class="filter-group">
        <div class="filter-group-label">Classes</div>
        <div class="toggle-row" id="classToggles"></div>
      </div>

      <div class="filter-group">
        <div class="filter-group-label">Subclasses</div>
        <div class="toggle-row" id="subclassToggles"></div>
      </div>

      <div class="filter-group">
        <div class="filter-group-label">Exotic Armor</div>
        <div class="toggle-row">
          <label class="toggle-item"><input type="checkbox" id="toggle-exotic-enabled" checked> Enable Exotic Armor wheel</label>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-group-label">Exotic Pool</div>
        <div class="toggle-row">
          <label class="toggle-item"><input type="checkbox" id="toggle-neutral" checked> Include Neutral</label>
          <label class="toggle-item"><input type="checkbox" id="toggle-pvp" checked> Include PvP-only</label>
          <label class="toggle-item"><input type="checkbox" id="toggle-pve" checked> Include PvE-only</label>
        </div>
      </div>

    </div>
  </details>
</div>

<script src="exotics.js"></script>
<script src="notes.js"></script>
<script>
// ---------------------------------------------------------
// MODULAR OPTIONS - edit these lists to change what's on the wheel
// ---------------------------------------------------------
const CLASSES = ["Titan", "Hunter", "Warlock"];
const SUBCLASSES = ["Solar", "Arc", "Void", "Strand", "Stasis", "Prismatic"];

const CLASS_COLORS = {
  "Titan": "#e03c3c",
  "Hunter": "#3c6ee0",
  "Warlock": "#e0c93c",
};

const SUBCLASS_COLORS = {
  "Solar": "#e08a2b",
  "Arc": "#5bc8e0",
  "Void": "#9b5be0",
  "Strand": "#4fbf4f",
  "Stasis": "#2b4fbf",
  "Prismatic": "#e05bb0",
};

const DEFAULT_COLOR = "#111111";
const EXOTIC_COLOR = "#c9a227";     // gold, matching Destiny's exotic rarity color
const EMPTY_LIST_COLOR = "#666666"; // used when a list has nothing added yet

// How much less often Neutral exotics show up relative to subclass-specific
// ones, since Neutral lists tend to be much longer. 1.0 = no de-emphasis,
// 0.5 = Neutral entries are half as likely each as a subclass-specific one.
const NEUTRAL_WEIGHT = 0.5;

// Spin timing
const SPIN_STEPS = 18;
const SUBCLASS_EXTRA_STEPS = 7;
const SPIN_DELAY_MS = 80;

// Sound volume, 0.0 (silent) to 1.0 (full)
const TICK_VOLUME = 0.08;
const DING_VOLUME = 0.12;
const SOUND_ENABLED = true;

// Rainbow title animation
const RAINBOW_SPEED = 0.015;
const RAINBOW_SPREAD = 0.06;
const RAINBOW_FRAME_MS = 60;

// ---------------------------------------------------------
// TITLE - build letter spans and animate rainbow colors
// ---------------------------------------------------------
const titleText = "DESTINY 2 - SPIN THE WHEEL";
const titleEl = document.getElementById("title");
const letterEls = [...titleText].map(ch => {
  const span = document.createElement("span");
  span.textContent = ch === " " ? "\u00A0" : ch;
  titleEl.appendChild(span);
  return span;
});

function hsvToHex(h, s, v) {
  let r, g, b;
  const i = Math.floor(h * 6);
  const f = h * 6 - i;
  const p = v * (1 - s);
  const q = v * (1 - f * s);
  const t = v * (1 - (1 - f) * s);
  switch (i % 6) {
    case 0: r = v; g = t; b = p; break;
    case 1: r = q; g = v; b = p; break;
    case 2: r = p; g = v; b = t; break;
    case 3: r = p; g = q; b = v; break;
    case 4: r = t; g = p; b = v; break;
    case 5: r = v; g = p; b = q; break;
  }
  const toHex = (x) => Math.round(x * 255).toString(16).padStart(2, "0");
  return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
}

let rainbowFrame = 0;
function animateTitle() {
  letterEls.forEach((span, i) => {
    const hue = (rainbowFrame * RAINBOW_SPEED - i * RAINBOW_SPREAD + 1000) % 1.0;
    span.style.color = hsvToHex(hue, 0.85, 1.0);
  });
  rainbowFrame++;
  setTimeout(animateTitle, RAINBOW_FRAME_MS);
}
animateTitle();

// ---------------------------------------------------------
// NOTES PANEL - just displays whatever is written in notes.js
// ---------------------------------------------------------
document.getElementById("notesContent").textContent = typeof NOTES_TEXT !== "undefined" ? NOTES_TEXT : "";

// ---------------------------------------------------------
// FILTER CHECKBOXES - built dynamically so they always match
// whatever is in CLASSES / SUBCLASSES above
// ---------------------------------------------------------
function buildToggleRow(containerId, names, prefix, options = {}) {
  const { defaultUnchecked = [], suffixes = {} } = options;
  const container = document.getElementById(containerId);
  names.forEach(name => {
    const label = document.createElement("label");
    label.className = "toggle-item";
    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = !defaultUnchecked.includes(name);
    checkbox.id = `${prefix}-${name}`;
    const suffix = suffixes[name] ? " " + suffixes[name] : "";
    label.appendChild(checkbox);
    label.appendChild(document.createTextNode(" " + name + suffix));
    container.appendChild(label);
  });
}
buildToggleRow("classToggles", CLASSES, "classToggle");
buildToggleRow("subclassToggles", SUBCLASSES, "subclassToggle", {
  defaultUnchecked: ["Prismatic"],
  suffixes: { "Prismatic": "[WIP]" },
});

function getEnabledNames(names, prefix) {
  return names.filter(name => document.getElementById(`${prefix}-${name}`).checked);
}

// Master on/off switch for the whole Exotic Armor stage. When off, the
// box is hidden, it's skipped during the spin, and it's left out of
// the "Your Build" summary entirely.
const exoticEnabledToggle = document.getElementById("toggle-exotic-enabled");
const exoticBoxEl = document.getElementById("exoticBox");
const buildExoticRowEl = document.getElementById("buildExoticRow");

function isExoticEnabled() {
  return exoticEnabledToggle.checked;
}

function updateExoticVisibility() {
  const show = isExoticEnabled();
  exoticBoxEl.style.display = show ? "" : "none";
  buildExoticRowEl.style.display = show ? "" : "none";
}
exoticEnabledToggle.addEventListener("change", updateExoticVisibility);
updateExoticVisibility();

// ---------------------------------------------------------
// SOUND - short synthesized tones via the Web Audio API
// ---------------------------------------------------------
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTone(freq, durationMs, volume) {
  if (!SOUND_ENABLED) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = freq;
    const now = ctx.currentTime;
    const dur = durationMs / 1000;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(volume, now + 0.004);
    gain.gain.linearRampToValueAtTime(0, now + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + dur + 0.01);
  } catch (e) { /* ignore audio errors */ }
}

function playTick() { playTone(500, 0.04, TICK_VOLUME); }
function playDoneDing() {
  playTone(700, 0.09, DING_VOLUME);
  setTimeout(() => playTone(950, 0.12, DING_VOLUME), 70);
}

// ---------------------------------------------------------
// SPIN LOGIC
// ---------------------------------------------------------
const spinButton = document.getElementById("spinButton");
const classResultEl = document.getElementById("classResult");
const subclassResultEl = document.getElementById("subclassResult");
const exoticResultEl = document.getElementById("exoticResult");
const buildClassEl = document.getElementById("buildClass");
const buildSubclassEl = document.getElementById("buildSubclass");
const buildExoticEl = document.getElementById("buildExotic");

let spinning = { class: false, subclass: false, exotic: false };
let tickTimer = null;
let lastClassResult = null;

// Every spinnable item is an {name, weight, tag} entry. Plain lists
// (classes, subclasses) just get weight 1 and no tag for everyone,
// which behaves identically to a plain random pick.
//
// Exotic names can carry an inline [PVP] or [PVE] tag right in the
// string (e.g. "Frost-EE5 [PVP]") - parseTag() strips that off for
// display and returns it separately so it can be filtered on.
function parseTag(rawName) {
  const match = rawName.match(/\s*\[(pvp|pve)\]\s*$/i);
  if (match) {
    return { name: rawName.slice(0, match.index).trim(), tag: match[1].toUpperCase() };
  }
  return { name: rawName, tag: null };
}

function toEntries(names, weight = 1) {
  return names.map(rawName => {
    const { name, tag } = parseTag(rawName);
    return { name, weight, tag };
  });
}

function pickUniform(entries) {
  return entries[Math.floor(Math.random() * entries.length)].name;
}

function pickWeighted(entries) {
  const total = entries.reduce((sum, e) => sum + e.weight, 0);
  let r = Math.random() * total;
  for (const e of entries) {
    if (r < e.weight) return e.name;
    r -= e.weight;
  }
  return entries[entries.length - 1].name; // fallback for rounding edge cases
}

// Builds the exotic entry list for a given class + subclass result,
// applying the Neutral weight and the PvP/PvE filter checkboxes.
// Prismatic combines its own dedicated list with the class's Neutral
// list (same as every other subclass) - it's not a hard isolation,
// Prismatic just also has its own unique class-item options on top.
function buildExoticEntries(className, subclassName) {
  const classData = EXOTICS[className];
  if (!classData) return [];

  let entries;
  if (subclassName === "Prismatic") {
    const prismaticEntries = toEntries(classData.Prismatic || [], 1);
    const neutralEntries = document.getElementById("toggle-neutral").checked
      ? toEntries(classData.Neutral || [], NEUTRAL_WEIGHT)
      : [];
    entries = prismaticEntries.concat(neutralEntries);
  } else {
    const subclassEntries = toEntries(classData[subclassName] || [], 1);
    const neutralEntries = document.getElementById("toggle-neutral").checked
      ? toEntries(classData.Neutral || [], NEUTRAL_WEIGHT)
      : [];
    entries = subclassEntries.concat(neutralEntries);
  }

  const includePvP = document.getElementById("toggle-pvp").checked;
  const includePvE = document.getElementById("toggle-pve").checked;
  return entries.filter(e => {
    if (!includePvP && e.tag === "PVP") return false;
    if (!includePvE && e.tag === "PVE") return false;
    return true;
  });
}

function animateSpin(entries, el, key, totalSteps, colorResolver, onDone, emptyMessage, step = 0) {
  if (step === 0) {
    if (entries.length === 0) {
      el.textContent = emptyMessage;
      el.style.color = EMPTY_LIST_COLOR;
      el.classList.remove("landed");
      onDone(null);
      return;
    }
    spinning[key] = true;
  }

  if (step < totalSteps) {
    el.textContent = pickUniform(entries);
    el.style.color = DEFAULT_COLOR;
    el.classList.remove("landed");
    setTimeout(() => animateSpin(entries, el, key, totalSteps, colorResolver, onDone, emptyMessage, step + 1), SPIN_DELAY_MS);
  } else {
    const result = pickWeighted(entries);
    el.textContent = result;
    el.style.color = colorResolver(result);
    el.classList.add("landed");
    spinning[key] = false;
    onDone(result);
  }
}

function tickLoop() {
  if (spinning.class || spinning.subclass || spinning.exotic) {
    playTick();
    tickTimer = setTimeout(tickLoop, SPIN_DELAY_MS);
  }
}

function onClassLanded(result) {
  lastClassResult = result;
  buildClassEl.textContent = result || "-";
  buildClassEl.style.color = result ? (CLASS_COLORS[result] || DEFAULT_COLOR) : DEFAULT_COLOR;
}

function onSubclassLanded(result) {
  buildSubclassEl.textContent = result || "-";
  buildSubclassEl.style.color = result ? (SUBCLASS_COLORS[result] || DEFAULT_COLOR) : DEFAULT_COLOR;

  if (!isExoticEnabled()) {
    finishSpin();
    return;
  }

  // Once class + subclass are both known, spin the exotic wheel using
  // the matching pool (subclass list + that class's Neutral list,
  // weighted and filtered by the Filters panel checkboxes).
  const entries = buildExoticEntries(lastClassResult, result);
  animateSpin(entries, exoticResultEl, "exotic", SPIN_STEPS, () => EXOTIC_COLOR, onExoticLanded, "No exotics match your filters");
}

function onExoticLanded(result) {
  buildExoticEl.textContent = result || "-";
  buildExoticEl.style.color = result ? EXOTIC_COLOR : DEFAULT_COLOR;
  finishSpin();
}

function finishSpin() {
  spinButton.disabled = false;
  playDoneDing();
}

function spinAll() {
  if (spinning.class || spinning.subclass || spinning.exotic) return;

  // Unlock audio on first user interaction (required by some browsers)
  getAudioCtx();

  spinButton.disabled = true;
  exoticResultEl.textContent = "-";
  exoticResultEl.style.color = DEFAULT_COLOR;
  exoticResultEl.classList.remove("landed");

  const enabledClasses = toEntries(getEnabledNames(CLASSES, "classToggle"));
  const enabledSubclasses = toEntries(getEnabledNames(SUBCLASSES, "subclassToggle"));

  animateSpin(enabledClasses, classResultEl, "class", SPIN_STEPS, (r) => CLASS_COLORS[r] || DEFAULT_COLOR, onClassLanded, "No classes enabled");
  animateSpin(enabledSubclasses, subclassResultEl, "subclass", SPIN_STEPS + SUBCLASS_EXTRA_STEPS, (r) => SUBCLASS_COLORS[r] || DEFAULT_COLOR, onSubclassLanded, "No subclasses enabled");
  tickLoop();
}

spinButton.addEventListener("click", spinAll);
</script>

</body>
</html>
